*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',-apple-system,Helvetica,Arial,sans-serif;background:var(--soft);color:var(--navy);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:780px;margin:0 auto;padding:26px 24px 48px}
.eyebrow{color:var(--teal);font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase}
h1{font-size:23px;font-weight:700;margin-top:2px}
.sub{color:var(--gray);font-size:13px;margin-top:3px}
.hidden{display:none!important}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.logincard{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:32px 30px;width:100%;max-width:380px}
.logincard h1{font-size:24px;margin:6px 0 4px}
.logincard p{color:var(--gray);font-size:13px;margin-bottom:22px}
label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin:14px 0 6px}
input{width:100%;font-family:inherit;font-size:14px;color:var(--navy);background:var(--bg);border:1px solid #CFDADA;border-radius:9px;padding:11px 13px}
input:focus{outline:none;border-color:var(--teal)}
.btn{width:100%;font-family:inherit;font-size:14px;font-weight:600;color:#fff;background:var(--navy);border:none;border-radius:9px;padding:12px;margin-top:22px;cursor:pointer}
.btn:hover{background:#16313a}
.lerr{color:var(--red);font-size:13px;margin-top:14px;min-height:18px}
.head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:16px}
.tools{display:flex;align-items:center;gap:8px}
.demo{background:#FBEFD9;color:#9A6B12;font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px}
.lk{font-size:12px;color:var(--gray);background:var(--bg);border:1px solid #CFDADA;border-radius:8px;padding:7px 12px;cursor:pointer}
.lk:hover{background:var(--soft)}
.filterbar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.filterbar label{margin:0;font-size:12px;color:var(--gray);font-weight:600}
.filterbar select{font-family:inherit;font-size:13px;color:var(--navy);background:var(--bg);border:1px solid #CFDADA;border-radius:8px;padding:7px 12px;font-weight:500}
.alertsbox{margin-bottom:22px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
.alerthdr{font-size:11px;font-weight:600;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;margin:0 0 13px}
.fillrow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.fillrow:last-child{margin-bottom:2px}
.fillrow .fb{font-size:13px;font-weight:600;color:var(--navy);width:108px;flex:none}
.fillrow .track{flex:1;height:13px;background:#EEF1F1;border-radius:7px;overflow:hidden}
.fillrow .track.unk{background:repeating-linear-gradient(45deg,#EEF1F1,#EEF1F1 5px,#E3E7E7 5px,#E3E7E7 10px)}
.fillrow .bar{height:100%;border-radius:7px}
.fillrow .fn{font-size:12px;font-weight:600;width:72px;text-align:right;flex:none}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.card .lbl{font-size:12px;color:var(--gray);font-weight:500;display:flex;align-items:center;gap:7px}
.card .dot{width:8px;height:8px;border-radius:50%;flex:none}
.card .num{font-size:27px;font-weight:700;margin-top:6px}
h2{font-size:15px;font-weight:600;margin-bottom:12px}
.row{display:flex;align-items:center;gap:13px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 15px;margin-bottom:9px}
.row .rdot{width:9px;height:9px;border-radius:50%;flex:none}
.row .info{flex:1;min-width:0}
.row .t{font-size:14px;font-weight:600}
.row .s{font-size:12px;color:var(--gray);margin-top:2px}
.brand{font-size:11px;color:var(--navy);font-weight:600;background:#EEF2F2;padding:2px 9px;border-radius:10px;white-space:nowrap}
.owner{font-size:11px;color:var(--teal);font-weight:600;background:#EAF3F1;padding:2px 9px;border-radius:10px;white-space:nowrap}
.owner.none{color:#8A8780;background:#EFF1F1;font-weight:500}
.row a{font-size:12.5px;font-weight:600;color:var(--navy);background:var(--bg);text-decoration:none;border:1px solid #CFDADA;border-radius:8px;padding:7px 12px;white-space:nowrap}
.row a:hover{background:var(--soft)}
.chip{background:#EAF3F1;color:var(--teal);font-weight:600;font-size:12px;padding:6px 14px;border-radius:20px;white-space:nowrap;height:fit-content}
.state{padding:40px 10px;text-align:center;color:var(--gray);font-size:14px}
.foot{margin-top:22px;color:var(--gray);font-size:11.5px;border-top:1px solid var(--line);padding-top:14px}
.mailconnect{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.mailconnect p{color:var(--gray);font-size:13px;margin-bottom:15px;max-width:560px}
.gmailbtn{width:auto;display:inline-flex;align-items:center;gap:8px;margin-top:0;padding:11px 18px}
.mailsum{font-size:12px;color:var(--gray);margin-bottom:13px}
.privacy{font-size:11px;color:#8A8780;margin-top:11px}
</style>
</head>
<body>

<div id="login" class="login hidden">
  <form class="logincard" id="loginform">
    <div class="eyebrow">Hyped Agency</div>
    <h1>Cockpit</h1>
    <p>Connecte-toi pour voir ta journée.</p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="prenom@hyped-agency.fr" required>
    <label for="password">Mot de passe</label>
    <input id="password" type="password" autocomplete="current-password" required>
    <button class="btn" type="submit">Se connecter</button>
    <div class="lerr" id="lerr"></div>
  </form>
</div>

<div id="app" class="wrap hidden">
  <div class="head">
    <div>
      <div class="eyebrow">Hyped Agency · Cockpit</div>
      <h1 id="greeting">…</h1>
      <div class="sub" id="subtitle"></div>
    </div>
    <div class="tools">
      <span id="demobadge" class="demo hidden">Mode démo</span>
      <span class="chip" id="totalchip">…</span>
      <button class="lk" id="refresh">Recharger</button>
      <button class="lk" id="logout">Déconnexion</button>
    </div>
  </div>
  <div class="filterbar hidden" id="filterbar"><label for="cpfilter">Vue</label><select id="cpfilter"></select></div>
  <div class="alertsbox hidden" id="alertsbox"></div>
  <div class="cards" id="cards"></div>
  <h2>À traiter</h2>
  <div id="list"><div class="state">Chargement…</div></div>
  <h2 id="mailhdr" class="hidden" style="margin-top:28px">Mes mails créateurs</h2>
  <div id="mailbox" class="hidden"></div>
  <div class="foot">Clients actifs uniquement · filtré par interlocutrice.</div>
</div>

<script>
const PREF=['À lancer','À transmettre','Négo','À valider','En production','Previews','À cadrer','À facturer'];
let ROWS=[], VIEWER=null;
const $=(id)=>document.getElementById(id);
function fmtDate(s){if(!s)return'';return new Date(s).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
function show(el,v){el.classList[v?'remove':'add']('hidden');}
async function api(p,o){return fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},o));}

async function init(){
  const r=await api('/api/me');
  if(r.status===200){VIEWER=await r.json();show($('app'),true);load();}
  else show($('login'),true);
}
$('loginform').addEventListener('submit',async(e)=>{
  e.preventDefault();$('lerr').textContent='';
  const r=await api('/api/login',{method:'POST',body:JSON.stringify({email:$('email').value,password:$('password').value})});
  if(r.ok)location.reload();
  else{const d=await r.json().catch(()=>({}));$('lerr').textContent=d.error||'Connexion impossible.';}
});
$('logout').addEventListener('click',async()=>{await api('/api/logout',{method:'POST'});location.reload();});
$('refresh').addEventListener('click',load);

async function load(){
  $('list').innerHTML='<div class="state">Chargement…</div>';
  const r=await api('/api/collabs');
  if(r.status===401){location.reload();return;}
  const d=await r.json();
  if(!r.ok){$('list').innerHTML='<div class="state" style="color:var(--red)">Erreur : '+(d.error||'')+'</div>';return;}
  ROWS=d.rows||[];VIEWER=d.viewer;show($('demobadge'),!!d.demo);
  const isSup=VIEWER.role==='supervisor';
  if(isSup){
    const present=ROWS.map(x=>x.cp).filter(Boolean);
    const cps=[...new Set([...(d.team||[]),...present])].sort();
    $('cpfilter').innerHTML='<option value="ALL">Toute l\'équipe</option>'+cps.map(c=>`<option value="${c}">${c}</option>`).join('');
    $('cpfilter').onchange=render;show($('filterbar'),true);
  }else show($('filterbar'),false);
  if(isSup)loadAlerts();else show($('alertsbox'),false);
  render();
  loadMail();
}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
async function loadMail(){
  try{
    const r=await api('/api/gmail/status');const s=await r.json();
    if(!s.enabled){show($('mailhdr'),false);show($('mailbox'),false);return;}
    show($('mailhdr'),true);show($('mailbox'),true);
    if(!s.connected){
      $('mailbox').innerHTML='<div class="mailconnect"><p>Connecte ta boîte Gmail pour faire remonter ici les <b>réponses de tes créateurs</b>, classées par marque (réponses, previews, factures, logistique). Lecture seule — aucun mail n\'est envoyé ni modifié, et personne d\'autre que toi ne voit ta boîte.</p><button class="btn gmailbtn" id="gmailconnect">Connecter mon Gmail</button></div>';
      $('gmailconnect').onclick=async()=>{
        $('gmailconnect').textContent='Redirection…';
        const rr=await api('/api/gmail/connect');const dd=await rr.json();
        if(dd.url)window.location.href=dd.url;else{$('gmailconnect').textContent='Connecter mon Gmail';alert(dd.error||'Indisponible');}
      };
      return;
    }
    $('mailbox').innerHTML='<div class="state">Analyse de ta boîte…</div>';
    const ir=await api('/api/gmail/inbox');const d=await ir.json();
    if(d.connected===false){ $('mailbox').innerHTML='<div class="mailconnect"><p>Connexion expirée.</p><button class="btn gmailbtn" id="gmailconnect">Reconnecter mon Gmail</button></div>'; $('gmailconnect').onclick=()=>loadMail(); return; }
    renderMail(d);
  }catch(e){show($('mailhdr'),false);show($('mailbox'),false);}
}
function renderMail(d){
  const reps=d.creatorReplies||[];
  const sum=`<div class="mailsum">${d.relevant||0} mail(s) liés à tes collabs · <b>${reps.length} réponse(s) créateur</b> · ${(d.noise||0)+(d.offTopic||0)} ignoré(s) (pubs, recrutement, newsletters)</div>`;
  if(!reps.length){$('mailbox').innerHTML=sum+'<div class="state">Aucune réponse créateur récente. 👌</div>';return;}
  const CC={facturation:'#C77F2A',preview:'#7A5AA8',logistique:'#2C9087','réponse':'#1C3A44'};
  $('mailbox').innerHTML=sum+reps.map(m=>{
    const who=m.créateur?`<span class="owner">${esc(m.créateur)}</span>`:'';
    const c=CC[m.category]||'#56666D';
    const link=m.url?`<a href="${m.url}" target="_blank" rel="noopener">Ouvrir</a>`:'';
    return `<div class="row"><span class="rdot" style="background:${c}"></span>
      <div class="info"><div class="t">${esc(m.subject)||'(sans objet)'}</div><div class="s">${esc(m.from)} · ${esc(m.category)}</div></div>
      <span class="brand">${esc(m.brand)}</span>${who}${link}</div>`;
  }).join('');
}
async function loadAlerts(){
  try{
    const r=await api('/api/alerts');const d=await r.json();
    const fill=d.fill||[];
    if(!fill.length){show($('alertsbox'),false);return;}
    const bar=(c)=>{
      const t=c.target||12;
      if(c.status==='inconnu'||c.status==='erreur')
        return `<div class="fillrow"><span class="fb">${c.brand}</span><div class="track unk"></div><span class="fn" style="color:#8A8780">non vérif.</span></div>`;
      const pct=Math.min(100,Math.round((c.count||0)/t*100));
      const col=c.status==='vide'?'#C2553B':(c.status==='faible'?'#C77F2A':'#2C9087');
      const num=c.status==='vide'?'#C2553B':(c.status==='faible'?'#9A6B12':'#0F6E56');
      return `<div class="fillrow"><span class="fb">${c.brand}</span><div class="track"><div class="bar" style="width:${pct}%;background:${col}"></div></div><span class="fn" style="color:${num}">${(c.count||0)}/${t}</span></div>`;
    };
    $('alertsbox').innerHTML='<div class="alerthdr">Remplissage des calendriers · '+(d.monthLabel||'')+' · objectif 3 collabs/semaine</div>'+fill.map(bar).join('');
    show($('alertsbox'),true);
  }catch(e){show($('alertsbox'),false);}
}
function render(){
  const isSup=VIEWER.role==='supervisor';
  const f=isSup?$('cpfilter').value:null;
  let list=ROWS.slice();
  if(isSup&&f&&f!=='ALL')list=list.filter(r=>r.cp===f);
  // groupes présents, ordonnés
  const present=[...new Set(list.map(r=>r.grp))];
  const ORDER=PREF.filter(g=>present.includes(g)).concat(present.filter(g=>!PREF.includes(g)));
  const colorOf={}; list.forEach(r=>{if(!colorOf[r.grp])colorOf[r.grp]=r.color;});
  const counts={}; ORDER.forEach(g=>counts[g]=0); list.forEach(r=>counts[r.grp]++);
  $('cards').innerHTML=ORDER.map(g=>
    `<div class="card"><div class="lbl"><span class="dot" style="background:${colorOf[g]||'#888'}"></span>${g}</div>
       <div class="num">${counts[g]}</div></div>`).join('');
  list.sort((a,b)=>(b.urgent-a.urgent)||(ORDER.indexOf(a.grp)-ORDER.indexOf(b.grp)));
  const total=list.length;
  $('totalchip').textContent=total+' action'+(total>1?'s':'');
  const dstr=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  if(isSup&&(!f||f==='ALL')){$('greeting').textContent='Vue pilote — toute l\'équipe';$('subtitle').textContent=total+' actions · clients actifs · '+dstr;}
  else{const who=isSup?f:VIEWER.name;$('greeting').textContent='Bonjour '+who+' 👋';$('subtitle').textContent=total+' chose'+(total>1?'s':'')+' à traiter · '+dstr;}
  if(!total){$('list').innerHTML='<div class="state">Rien en attente — tout est à jour 🎉</div>';return;}
  $('list').innerHTML=list.map(a=>{
    const extra=[a.label];if(a.date)extra.push(fmtDate(a.date));
    const owner=(isSup&&a.cp)?`<span class="owner" title="Cheffe de projet">${a.cp}</span>`:(isSup?`<span class="owner none" title="Personne assignée">— non assigné</span>`:'');
    const link=a.url?`<a href="${a.url}" target="_blank" rel="noopener">Ouvrir</a>`:'';
    return `<div class="row">
      <span class="rdot" style="background:${a.color}"></span>
      <div class="info"><div class="t">${a.name}</div><div class="s">${extra.join(' · ')}</div></div>
      ${owner}<span class="brand">${a.brand}</span>${link}</div>`;
  }).join('');
}
init();
</script>
</body>
</html>
