*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',-apple-system,Helvetica,Arial,sans-serif;background:var(--soft);color:var(--navy);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:780px;margin:0 auto;padding:26px 24px 48px}
.eyebrow{color:var(--teal);font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase}
h1{font-size:23px;font-weight:700;margin-top:2px}
.sub{color:var(--gray);font-size:13px;margin-top:3px}
.hidden{display:none!important}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.logincard{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:32px 30px;width:100%;max-width:380px}
.logincard h1{font-size:24px;margin:6px 0 4px}
.logincard p{color:var(--gray);font-size:13px;margin-bottom:22px}
label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin:14px 0 6px}
input{width:100%;font-family:inherit;font-size:14px;color:var(--navy);background:var(--bg);border:1px solid #CFDADA;border-radius:9px;padding:11px 13px}
input:focus{outline:none;border-color:var(--teal)}
.btn{width:100%;font-family:inherit;font-size:14px;font-weight:600;color:#fff;background:var(--navy);border:none;border-radius:9px;padding:12px;margin-top:22px;cursor:pointer}
.btn:hover{background:#16313a}
.lerr{color:var(--red);font-size:13px;margin-top:14px;min-height:18px}
.head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:16px}
.tools{display:flex;align-items:center;gap:8px}
.demo{background:#FBEFD9;color:#9A6B12;font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px}
.lk{font-size:12px;color:var(--gray);background:var(--bg);border:1px solid #CFDADA;border-radius:8px;padding:7px 12px;cursor:pointer}
.lk:hover{background:var(--soft)}
.filterbar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.filterbar label{margin:0;font-size:12px;color:var(--gray);font-weight:600}
.filterbar select{font-family:inherit;font-size:13px;color:var(--navy);background:var(--bg);border:1px solid #CFDADA;border-radius:8px;padding:7px 12px;font-weight:500}
.alertsbox{margin-bottom:22px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
.alerthdr{font-size:11px;font-weight:600;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;margin:0 0 13px}
.fillrow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.fillrow:last-child{margin-bottom:2px}
.fillrow .fb{font-size:13px;font-weight:600;color:var(--navy);width:108px;flex:none}
.fillrow .track{flex:1;height:13px;background:#EEF1F1;border-radius:7px;overflow:hidden}
.fillrow .track.unk{background:repeating-linear-gradient(45deg,#EEF1F1,#EEF1F1 5px,#E3E7E7 5px,#E3E7E7 10px)}
.fillrow .bar{height:100%;border-radius:7px}
.fillrow .fn{font-size:12px;font-weight:600;width:72px;text-align:right;flex:none}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.card .lbl{font-size:12px;color:var(--gray);font-weight:500;display:flex;align-items:center;gap:7px}
.card .dot{width:8px;height:8px;border-radius:50%;flex:none}
.card .num{font-size:27px;font-weight:700;margin-top:6px}
h2{font-size:15px;font-weight:600;margin-bottom:12px}
.row{display:flex;align-items:center;gap:13px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 15px;margin-bottom:9px}
.row .rdot{width:9px;height:9px;border-radius:50%;flex:none}
.row .info{flex:1;min-width:0}
.row .t{font-size:14px;font-weight:600}
.row .s{font-size:12px;color:var(--gray);margin-top:2px}
.brand{font-size:11px;color:var(--navy);font-weight:600;background:#EEF2F2;padding:2px 9px;border-radius:10px;white-space:nowrap}
.owner{font-size:11px;color:var(--teal);font-weight:600;background:#EAF3F1;padding:2px 9px;border-radius:10px;white-space:nowrap}
.owner.none{color:#8A8780;background:#EFF1F1;font-weight:500}
.row a{font-size:12.5px;font-weight:600;color:var(--navy);background:var(--bg);text-decoration:none;border:1px solid #CFDADA;border-radius:8px;padding:7px 12px;white-space:nowrap}
.row a:hover{background:var(--soft)}
.chip{background:#EAF3F1;color:var(--teal);font-weight:600;font-size:12px;padding:6px 14px;border-radius:20px;white-space:nowrap;height:fit-content}
.state{padding:40px 10px;text-align:center;color:var(--gray);font-size:14px}
.foot{margin-top:22px;color:var(--gray);font-size:11.5px;border-top:1px solid var(--line);padding-top:14px}
.mailconnect{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.mailconnect p{color:var(--gray);font-size:13px;margin-bottom:15px;max-width:560px}
.gmailbtn{width:auto;display:inline-flex;align-items:center;gap:8px;margin-top:0;padding:11px 18px}
.mailsum{font-size:12px;color:var(--gray);margin-bottom:13px}
.privacy{font-size:11px;color:#8A8780;margin-top:11px}
.todoadd{display:flex;gap:8px;margin-bottom:12px}
.todoadd input{flex:1}
.todoadd .lk{white-space:nowrap}
.todo{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 15px;margin-bottom:8px}
.todo .check{width:21px;height:21px;border:2px solid #CFDADA;border-radius:6px;background:#fff;cursor:pointer;flex:none;transition:all .12s}
.todo .check:hover{border-color:var(--teal);background:#EAF3F1}
.todo .check.on{border-color:var(--teal);background:var(--teal)}
.todo .info{flex:1;min-width:0}
.todo .t{font-size:14px;font-weight:600}
.todo .s{font-size:12px;color:var(--gray);margin-top:2px}
.prio{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;white-space:nowrap}
.prio.Haute{color:#C2553B;background:#F7E7E2}.prio.Moyenne{color:#9A6B12;background:#FBEFD9}.prio.Basse{color:#0F6E56;background:#E4F1ED}
.srcadd{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.srcadd input{flex:1;min-width:150px}
.srcadd select{font-family:inherit;font-size:13px;color:var(--navy);background:var(--bg);border:1px solid #CFDADA;border-radius:8px;padding:7px 10px}
.srcdone{white-space:nowrap;cursor:pointer;color:var(--teal);border-color:#BfE0D9}
.srcmsg{white-space:nowrap;cursor:pointer}
.msgpanel{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin:-2px 0 10px}
.msgbar{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.seg{display:inline-flex}
.seg button{font-family:inherit;font-size:12px;font-weight:600;border:1px solid #CFDADA;background:var(--bg);color:var(--gray);padding:6px 12px;cursor:pointer}
.seg button:first-child{border-radius:8px 0 0 8px}
.seg button:last-child{border-radius:0 8px 8px 0;border-left:none}
.seg button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.msgdisp{flex:1;min-width:160px}
.msgtxt{width:100%;font-family:inherit;font-size:13px;color:var(--navy);background:var(--bg);border:1px solid #CFDADA;border-radius:9px;padding:11px;line-height:1.55;resize:vertical}
.msgcopy{margin-top:8px}
.msgdraft{margin-top:8px}
.draftbanner{display:block;background:#FBEFD9;color:#9A6B12;border:1px solid #F0E0C0;border-radius:11px;padding:12px 16px;margin-bottom:18px;font-weight:600;font-size:13.5px;text-decoration:none}
.draftbanner:hover{background:#F6E6C8}
</style>
</head>
<body>

<div id="login" class="login hidden">
  <form class="logincard" id="loginform">
    <div class="eyebrow">Hyped Agency</div>
    <h1>Cockpit</h1>
    <p>Connecte-toi pour voir ta journée.</p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="prenom@hyped-agency.fr" required>
    <label for="password">Mot de passe</label>
    <input id="password" type="password" autocomplete="current-password" required>
    <button class="btn" type="submit">Se connecter</button>
    <div class="lerr" id="lerr"></div>
  </form>
</div>

<div id="app" class="wrap hidden">
  <div class="head">
    <div>
      <div class="eyebrow">Hyped Agency · Cockpit</div>
      <h1 id="greeting">…</h1>
      <div class="sub" id="subtitle"></div>
    </div>
    <div class="tools">
      <span id="demobadge" class="demo hidden">Mode démo</span>
      <span class="chip" id="totalchip">…</span>
      <button class="lk" id="refresh">Recharger</button>
      <button class="lk" id="logout">Déconnexion</button>
    </div>
  </div>
  <a id="draftbanner" class="draftbanner hidden" href="https://mail.google.com/mail/u/0/#drafts" target="_blank" rel="noopener"></a>
  <div class="filterbar hidden" id="filterbar"><label for="cpfilter">Vue</label><select id="cpfilter"></select></div>
  <div class="alertsbox hidden" id="alertsbox"></div>
  <div class="cards" id="cards"></div>
  <h2 id="visiohdr" class="hidden">Visios du jour</h2>
  <div id="visiobox" class="hidden"></div>
  <h2 id="todohdr" class="hidden">Ma to-do</h2>
  <div id="todobox" class="hidden"></div>
  <h2 id="srchdr" class="hidden">Profils à contacter</h2>
  <div id="srcbox" class="hidden"></div>
  <h2>À traiter</h2>
  <div id="list"><div class="state">Chargement…</div></div>
  <h2 id="mailhdr" class="hidden" style="margin-top:28px">Mes mails créateurs</h2>
  <div id="mailbox" class="hidden"></div>
  <div class="foot">Clients actifs uniquement · filtré par interlocutrice.</div>
</div>

<script>
const PREF=['À lancer','À transmettre','Négo','À valider','En production','Previews','À cadrer','À facturer'];
let ROWS=[], VIEWER=null, TEAM=[];
const $=(id)=>document.getElementById(id);
function fmtDate(s){if(!s)return'';return new Date(s).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
function show(el,v){el.classList[v?'remove':'add']('hidden');}
async function api(p,o){return fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},o));}

async function init(){
  const r=await api('/api/me');
  if(r.status===200){VIEWER=await r.json();show($('app'),true);load();}
  else show($('login'),true);
}
$('loginform').addEventListener('submit',async(e)=>{
  e.preventDefault();$('lerr').textContent='';
  const r=await api('/api/login',{method:'POST',body:JSON.stringify({email:$('email').value,password:$('password').value})});
  if(r.ok)location.reload();
  else{const d=await r.json().catch(()=>({}));$('lerr').textContent=d.error||'Connexion impossible.';}
});
$('logout').addEventListener('click',async()=>{await api('/api/logout',{method:'POST'});location.reload();});
$('refresh').addEventListener('click',load);

async function load(){
  $('list').innerHTML='<div class="state">Chargement…</div>';
  const r=await api('/api/collabs');
  if(r.status===401){location.reload();return;}
  const d=await r.json();
  if(!r.ok){$('list').innerHTML='<div class="state" style="color:var(--red)">Erreur : '+(d.error||'')+'</div>';return;}
  ROWS=d.rows||[];VIEWER=d.viewer;TEAM=d.team||[];show($('demobadge'),!!d.demo);
  const isSup=VIEWER.role==='supervisor';
  if(isSup){
    const present=ROWS.map(x=>x.cp).filter(Boolean);
    const cps=[...new Set([...(d.team||[]),...present])].sort();
    $('cpfilter').innerHTML='<option value="ALL">Toute l\'équipe</option>'+cps.map(c=>`<option value="${c}">${c}</option>`).join('');
    $('cpfilter').onchange=()=>{render();loadTodo();};show($('filterbar'),true);
  }else show($('filterbar'),false);
  if(isSup)loadAlerts();else show($('alertsbox'),false);
  render();
  loadVisios();
  loadTodo();
  loadSourcing();
  loadMail();
  loadDrafts();
}
async function loadDrafts(){
  try{
    const r=await api('/api/gmail/drafts');const d=await r.json();
    if(d&&d.count>0){
      $('draftbanner').textContent='📧 '+d.count+' brouillon'+(d.count>1?'s':'')+' à valider — clique pour les relire et les envoyer depuis Gmail';
      show($('draftbanner'),true);
    } else show($('draftbanner'),false);
  }catch(e){show($('draftbanner'),false);}
}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
async function loadMail(){
  try{
    const r=await api('/api/gmail/status');const s=await r.json();
    if(!s.enabled){show($('mailhdr'),false);show($('mailbox'),false);return;}
    show($('mailhdr'),true);show($('mailbox'),true);
    if(!s.connected){
      $('mailbox').innerHTML='<div class="mailconnect"><p>Connecte ta boîte Gmail pour faire remonter ici les <b>réponses de tes créateurs</b>, classées par marque (réponses, previews, factures, logistique). Lecture seule — aucun mail n\'est envoyé ni modifié, et personne d\'autre que toi ne voit ta boîte.</p><button class="btn gmailbtn" id="gmailconnect">Connecter mon Gmail</button></div>';
      $('gmailconnect').onclick=async()=>{
        $('gmailconnect').textContent='Redirection…';
        const rr=await api('/api/gmail/connect');const dd=await rr.json();
        if(dd.url)window.location.href=dd.url;else{$('gmailconnect').textContent='Connecter mon Gmail';alert(dd.error||'Indisponible');}
      };
      return;
    }
    $('mailbox').innerHTML='<div class="state">Analyse de ta boîte…</div>';
    const ir=await api('/api/gmail/inbox');const d=await ir.json();
    if(d.connected===false){ $('mailbox').innerHTML='<div class="mailconnect"><p>Connexion expirée.</p><button class="btn gmailbtn" id="gmailconnect">Reconnecter mon Gmail</button></div>'; $('gmailconnect').onclick=()=>loadMail(); return; }
    renderMail(d);
  }catch(e){show($('mailhdr'),false);show($('mailbox'),false);}
}
function renderMail(d){
  const reps=d.creatorReplies||[];
  const sum=`<div class="mailsum">${d.relevant||0} mail(s) liés à tes collabs · <b>${reps.length} réponse(s) créateur</b> · ${(d.noise||0)+(d.offTopic||0)} ignoré(s) (pubs, recrutement, newsletters)</div>`;
  if(!reps.length){$('mailbox').innerHTML=sum+'<div class="state">Aucune réponse créateur récente. 👌</div>';return;}
  const CC={facturation:'#C77F2A',preview:'#7A5AA8',logistique:'#2C9087','réponse':'#1C3A44'};
  $('mailbox').innerHTML=sum+reps.map(m=>{
    const who=m.créateur?`<span class="owner">${esc(m.créateur)}</span>`:'';
    const c=CC[m.category]||'#56666D';
    const link=m.url?`<a href="${m.url}" target="_blank" rel="noopener">Ouvrir</a>`:'';
    return `<div class="row"><span class="rdot" style="background:${c}"></span>
      <div class="info"><div class="t">${esc(m.subject)||'(sans objet)'}</div><div class="s">${esc(m.from)} · ${esc(m.category)}</div></div>
      <span class="brand">${esc(m.brand)}</span>${who}${link}</div>`;
  }).join('');
}
async function loadAlerts(){
  try{
    const r=await api('/api/alerts');const d=await r.json();
    const fill=d.fill||[];
    if(!fill.length){show($('alertsbox'),false);return;}
    const bar=(c)=>{
      const t=c.target||12;
      if(c.status==='inconnu'||c.status==='erreur')
        return `<div class="fillrow"><span class="fb">${c.brand}</span><div class="track unk"></div><span class="fn" style="color:#8A8780">non vérif.</span></div>`;
      const pct=Math.min(100,Math.round((c.count||0)/t*100));
      const col=c.status==='vide'?'#C2553B':(c.status==='faible'?'#C77F2A':'#2C9087');
      const num=c.status==='vide'?'#C2553B':(c.status==='faible'?'#9A6B12':'#0F6E56');
      return `<div class="fillrow"><span class="fb">${c.brand}</span><div class="track"><div class="bar" style="width:${pct}%;background:${col}"></div></div><span class="fn" style="color:${num}">${(c.count||0)}/${t}</span></div>`;
    };
    $('alertsbox').innerHTML='<div class="alerthdr">Remplissage des calendriers · '+(d.monthLabel||'')+' · objectif 3 collabs/semaine</div>'+fill.map(bar).join('');
    show($('alertsbox'),true);
  }catch(e){show($('alertsbox'),false);}
}
function render(){
  const isSup=VIEWER.role==='supervisor';
  const f=isSup?$('cpfilter').value:null;
  let list=ROWS.slice();
  if(isSup&&f&&f!=='ALL')list=list.filter(r=>r.cp===f);
  // groupes présents, ordonnés
  const present=[...new Set(list.map(r=>r.grp))];
  const ORDER=PREF.filter(g=>present.includes(g)).concat(present.filter(g=>!PREF.includes(g)));
  const colorOf={}; list.forEach(r=>{if(!colorOf[r.grp])colorOf[r.grp]=r.color;});
  const counts={}; ORDER.forEach(g=>counts[g]=0); list.forEach(r=>counts[r.grp]++);
  $('cards').innerHTML=ORDER.map(g=>
    `<div class="card"><div class="lbl"><span class="dot" style="background:${colorOf[g]||'#888'}"></span>${g}</div>
       <div class="num">${counts[g]}</div></div>`).join('');
  list.sort((a,b)=>(b.urgent-a.urgent)||(ORDER.indexOf(a.grp)-ORDER.indexOf(b.grp)));
  const total=list.length;
  $('totalchip').textContent=total+' action'+(total>1?'s':'');
  const dstr=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  if(isSup&&(!f||f==='ALL')){$('greeting').textContent='Vue pilote — toute l\'équipe';$('subtitle').textContent=total+' actions · clients actifs · '+dstr;}
  else{const who=isSup?f:VIEWER.name;$('greeting').textContent='Bonjour '+who+' 👋';$('subtitle').textContent=total+' chose'+(total>1?'s':'')+' à traiter · '+dstr;}
  if(!total){$('list').innerHTML='<div class="state">Rien en attente — tout est à jour 🎉</div>';return;}
  $('list').innerHTML=list.map(a=>{
    const extra=[a.label];if(a.date)extra.push(fmtDate(a.date));
    const owner=(isSup&&a.cp)?`<span class="owner" title="Cheffe de projet">${a.cp}</span>`:(isSup?`<span class="owner none" title="Personne assignée">— non assigné</span>`:'');
    const link=a.url?`<a href="${a.url}" target="_blank" rel="noopener">Ouvrir</a>`:'';
    return `<div class="row">
      <span class="rdot" style="background:${a.color}"></span>
      <div class="info"><div class="t">${a.name}</div><div class="s">${extra.join(' · ')}</div></div>
      ${owner}<span class="brand">${a.brand}</span>${link}</div>`;
  }).join('');
}
// --- Visios du jour (Google Agenda) -------------------------------------
function fmtTime(s){if(!s)return'';const d=new Date(s);return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
async function loadVisios(){
  try{
    const r=await api('/api/calendar');const d=await r.json();
    if(!d.enabled||!d.connected||!(d.events&&d.events.length)){show($('visiohdr'),false);show($('visiobox'),false);return;}
    show($('visiohdr'),true);show($('visiobox'),true);
    $('visiobox').innerHTML=d.events.map(e=>{
      const when=e.allDay?'journée':fmtTime(e.start)+(e.end?(' – '+fmtTime(e.end)):'');
      const link=e.meet?`<a href="${esc(e.meet)}" target="_blank" rel="noopener">Rejoindre</a>`:(e.htmlLink?`<a href="${esc(e.htmlLink)}" target="_blank" rel="noopener">Ouvrir</a>`:'');
      const dot=e.meet?'#2C9087':'#7A5AA8';
      const sub=[when]; if(e.location)sub.push(esc(e.location));
      return `<div class="row"><span class="rdot" style="background:${dot}"></span><div class="info"><div class="t">${esc(e.title)}</div><div class="s">${sub.join(' · ')}</div></div>${e.meet?'<span class="brand" style="color:#0F6E56;background:#E4F1ED">Meet</span>':''}${link}</div>`;
    }).join('');
  }catch(e){show($('visiohdr'),false);show($('visiobox'),false);}
}
// --- Ma to-do (Notion) --------------------------------------------------
async function loadTodo(){
  try{
    const isSup=VIEWER&&VIEWER.role==='supervisor';
    const view=(isSup&&$('cpfilter')&&$('cpfilter').value)?$('cpfilter').value:null;
    const r=await api('/api/todos'+(view?('?view='+encodeURIComponent(view)):''));const d=await r.json();
    if(!d.enabled){show($('todohdr'),false);show($('todobox'),false);return;}
    let hdr='Ma to-do';
    if(isSup) hdr=(!view||view==='ALL')?'To-do de l\'équipe':'To-do — '+view;
    $('todohdr').textContent=hdr;
    show($('todohdr'),true);show($('todobox'),true);
    renderTodo(d.tasks||[], isSup&&(!view||view==='ALL'), (isSup&&view&&view!=='ALL')?view:null);
  }catch(e){show($('todohdr'),false);show($('todobox'),false);}
}
function renderTodo(tasks, showOwner, addFor){
  const today=new Date().toISOString().slice(0,10);
  const add='<div class="todoadd"><input id="todoinput" placeholder="Ajouter une tâche'+(addFor?(' pour '+addFor):'')+'… puis Entrée"><button class="lk" id="todobtn">+ Ajouter</button></div>';
  let rows;
  if(!tasks.length) rows='<div class="state" style="padding:14px">Rien à faire — to-do à jour ✨</div>';
  else rows=tasks.map(t=>{
    const late=t.echeance&&t.echeance<today, due=t.echeance===today;
    const meta=[]; if(t.echeance)meta.push((late?'⚠ en retard · ':(due?'aujourd\'hui · ':''))+fmtDate(t.echeance)); if(t.projet)meta.push(esc(t.projet));
    const prio=t.priorite?`<span class="prio ${t.priorite}">${t.priorite}</span>`:'';
    const own=(showOwner&&t.responsable)?`<span class="owner">${esc(t.responsable)}</span>`:'';
    return `<div class="todo" data-id="${t.id}"><button class="check" title="Marquer comme fait"></button>
      <div class="info"><div class="t">${esc(t.task)}</div><div class="s" style="${late?'color:#C2553B':''}">${meta.join(' · ')}</div></div>${own}${prio}</div>`;
  }).join('');
  $('todobox').innerHTML=add+rows;
  $('todobtn').onclick=addTask;
  $('todoinput').onkeydown=(e)=>{if(e.key==='Enter')addTask();};
  document.querySelectorAll('#todobox .check').forEach(b=>b.onclick=()=>doneTask(b));
}
async function addTask(){
  const v=$('todoinput').value.trim(); if(!v)return;
  const isSup=VIEWER&&VIEWER.role==='supervisor';
  const view=(isSup&&$('cpfilter')&&$('cpfilter').value)?$('cpfilter').value:null;
  const body={task:v}; if(isSup&&view&&view!=='ALL') body.responsable=view;
  $('todoinput').value=''; $('todoinput').placeholder='Ajout…';
  await api('/api/todos',{method:'POST',body:JSON.stringify(body)});
  loadTodo();
}
async function doneTask(btn){
  btn.classList.add('on'); const id=btn.closest('.todo').dataset.id;
  await api('/api/todos/'+encodeURIComponent(id)+'/done',{method:'POST'});
  setTimeout(loadTodo,250);
}
// --- Veille : profils à contacter ---------------------------------------
const BRANDS=['In Haircare','Curls Matter','Doucéa','LIVA','Toki Bona',"FND'HER",'Hyped Agency','Autres'];
let SRC_PROFILS=[];
// Pitchs marque (calés sur tes vrais messages) pour le générateur de message d'approche
const BRAND_INFO={
 'In Haircare':{produits:"la routine complète In Haircare (Milk'In, Curl n'Go et le nouveau Final Touch)",
   fr:"In Haircare est une marque française spécialisée dans les soins capillaires pensés pour les cheveux texturés — bouclés, frisés, crépus — avec des formules clean, naturelles et efficaces, fabriquées en France et primées (Beauty Shortlist Awards 2025).",
   en:"In Haircare is a French haircare brand made for textured hair (curly, coily), with clean, natural and effective formulas, made in France and award-winning."},
 'Doucéa':{produits:"les soins Doucéa",
   fr:"Doucéa est une marque de soins dermo-pédiatriques pensée pour les enfants à peau sensible ou atopique. L'idée : réconcilier le besoin du parent et le plaisir de l'enfant, avec des soins efficaces, sensoriels et concentrés en madécassoside (actif apaisant).",
   en:"Doucéa is a dermo-pediatric skincare brand for children with sensitive or atopic skin — effective, sensory care that kids actually enjoy."},
 'LIVA':{produits:"the full LIVA range",
   fr:"LIVA est une marque de soins capillaires cliniquement testée, en lancement national chez Walmart (US) : lors d'une étude de 3 semaines, 85% des participantes ont trouvé leurs cheveux plus denses et plus sains.",
   en:"LIVA is a clinically tested hair regrowth brand launching nationwide at Walmart. In a 3-week study, 85% of participants said their hair looked fuller and healthier."},
 'Curls Matter':{produits:"les produits Curls Matter",
   fr:"Curls Matter est une marque dédiée au soin des cheveux bouclés et texturés.",
   en:"Curls Matter is a brand dedicated to curly and textured hair care."}
};
function genMessage(brand,inf,cp,disp,lang){
  const b=BRAND_INFO[brand]||{produits:(lang==='en'?'our products':'nos produits'),fr:brand+" est une marque que nous accompagnons chez Hyped Agency.",en:brand+" is a brand we work with at Hyped Agency."};
  const who=inf||(lang==='en'?'there':'');
  if(lang==='en') return `Hi ${who} ✨\n\nI'm ${cp} from Hyped Agency, and we're currently working with ${brand}.\n\n${b.en}\n\nI'm reaching out because we really love your content — we find it so qualitative and a great fit with the brand's universe. ✨\n\nWe'd love to send you ${b.produits} and explore a partnership around ${disp}.\n\nWould you be open to discovering the products and featuring them on your socials with ${brand}? If so, feel free to send me your full name, postal address and phone number so I can add you to our shipment.\n\nLooking forward to hearing from you,\n${cp}`;
  return `Hello ${who} ✨\n\nJe suis ${cp}, cheffe de projet chez Hyped Agency, et je représente la marque ${brand}.\n\n${b.fr}\n\nJe te contacte car nous aimons beaucoup ton contenu, que nous trouvons très qualitatif et en parfaite adéquation avec l'univers de la marque. ✨\n\nL'idée serait de te faire découvrir ${b.produits} et de mettre en avant ${disp} dans le cadre d'un partenariat avec ${brand}.\n\nSerais-tu partante ? Je reste bien sûr disponible pour la moindre question et serais ravie d'échanger avec toi. 🤍\n\nAu plaisir de te lire,\n${cp}`;
}
function openMessage(btn){
  const row=btn.closest('.row'); const id=row.dataset.id;
  const nx=row.nextElementSibling;
  if(nx&&nx.classList.contains('msgpanel')){nx.remove();return;}
  const p=SRC_PROFILS.find(x=>x.id===id)||{};
  const inf=String(p.task||'').replace(/^@/,'').split(/[ (]/)[0]||'';
  const cp=p.responsable||(VIEWER&&VIEWER.name)||'';
  const brand=p.projet||'';
  const panel=document.createElement('div'); panel.className='msgpanel';
  panel.innerHTML='<div class="msgbar"><span class="seg"><button data-l="fr" class="on">FR</button><button data-l="en">EN</button></span><input class="msgdisp" value="1 Reel + 1 set de stories"></div><textarea class="msgtxt" rows="12"></textarea><button class="lk msgcopy">Copier</button> <button class="lk msgdraft">📧 Créer le brouillon</button>';
  row.after(panel);
  let lang='fr';
  const ta=panel.querySelector('.msgtxt'), disp=panel.querySelector('.msgdisp');
  const regen=()=>{ta.value=genMessage(brand,inf,cp,disp.value,lang);};
  panel.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{lang=b.dataset.l;panel.querySelectorAll('.seg button').forEach(x=>x.classList.toggle('on',x===b));regen();});
  disp.oninput=regen;
  const cpbtn=panel.querySelector('.msgcopy');
  cpbtn.onclick=()=>{ta.select();try{document.execCommand('copy');}catch(e){}cpbtn.textContent='Copié ✓';setTimeout(()=>cpbtn.textContent='Copier',1500);};
  const dbtn=panel.querySelector('.msgdraft');
  dbtn.onclick=async()=>{
    dbtn.textContent='…';
    const subject=(lang==='en'?'Partnership with ':'Partenariat ')+brand+' — Hyped Agency';
    const r=await api('/api/gmail/draft',{method:'POST',body:JSON.stringify({subject,body:ta.value})});
    const d=await r.json().catch(()=>({}));
    if(d&&d.ok){dbtn.textContent='Brouillon créé ✓';loadDrafts();}
    else dbtn.textContent='↻ Reconnecte ton Gmail';
    setTimeout(()=>{dbtn.textContent='📧 Créer le brouillon';},2600);
  };
  regen();
}
async function loadSourcing(){
  try{
    const r=await api('/api/sourcing');const d=await r.json();
    if(!d.enabled){show($('srchdr'),false);show($('srcbox'),false);return;}
    show($('srchdr'),true);show($('srcbox'),true);
    renderSourcing(d.profils||[]);
  }catch(e){show($('srchdr'),false);show($('srcbox'),false);}
}
function renderSourcing(profils){
  SRC_PROFILS=profils;
  const isSup=VIEWER&&VIEWER.role==='supervisor';
  const opts=BRANDS.map(b=>`<option value="${b}">${b}</option>`).join('');
  const cpopts='<option value="">CP : à attribuer</option>'+(TEAM||[]).map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  const cpsel=isSup?('<select id="srccp" title="Chef de projet à allouer">'+cpopts+'</select>'):'';
  const add='<div class="srcadd"><input id="srcprofil" placeholder="@profil ou lien"><select id="srcmarque">'+opts+'</select>'+cpsel+'<button class="lk" id="srcbtn">+ Ajouter</button></div>';
  let rows;
  if(!profils.length) rows='<div class="state" style="padding:14px">Aucun profil à contacter — ajoute-en un, ou ils arriveront via la veille. 🔎</div>';
  else rows=profils.map(p=>{
    const link=p.lien?`<a href="${esc(p.lien)}" target="_blank" rel="noopener">Profil</a>`:'';
    const who=p.responsable?`<span class="owner">${esc(p.responsable)}</span>`:'<span class="owner none">à attribuer</span>';
    const sub=p.commentaire?esc(p.commentaire):'à contacter';
    return `<div class="row" data-id="${p.id}"><span class="rdot" style="background:#C77F2A"></span>
      <div class="info"><div class="t">${esc(p.task)}</div><div class="s">${sub}</div></div>
      ${p.projet?`<span class="brand">${esc(p.projet)}</span>`:''}${who}${link}
      <button class="lk srcmsg">✍️ Message</button><button class="lk srcdone">Contacté ✓</button></div>`;
  }).join('');
  $('srcbox').innerHTML=add+rows;
  $('srcbtn').onclick=addProfil;
  $('srcprofil').onkeydown=(e)=>{if(e.key==='Enter')addProfil();};
  document.querySelectorAll('#srcbox .srcdone').forEach(b=>b.onclick=()=>markContacted(b));
  document.querySelectorAll('#srcbox .srcmsg').forEach(b=>b.onclick=()=>openMessage(b));
}
async function addProfil(){
  const profil=$('srcprofil').value.trim(); if(!profil)return;
  const marque=$('srcmarque').value;
  const cp=($('srccp')&&$('srccp').value)?$('srccp').value:null;
  $('srcprofil').value='';
  const body={profil,marque}; if(cp)body.responsable=cp;
  await api('/api/sourcing',{method:'POST',body:JSON.stringify(body)});
  loadSourcing();
}
async function markContacted(btn){
  btn.textContent='…'; const id=btn.closest('.row').dataset.id;
  await api('/api/sourcing/'+encodeURIComponent(id)+'/contacted',{method:'POST'});
  loadSourcing(); setTimeout(load,400);
}
init();
</script>

</html>
